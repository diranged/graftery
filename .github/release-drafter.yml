name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

categories:
  - title: "Features"
    labels: ["feature", "enhancement"]
  - title: "Bug Fixes"
    labels: ["bug", "fix"]
  - title: "Go CLI"
    labels: ["go", "cli"]
  - title: "macOS App"
    labels: ["swift", "macos", "ui"]
  - title: "Provisioning"
    labels: ["provisioning"]
  - title: "Infrastructure & CI"
    labels: ["ci", "infrastructure"]
  - title: "Dependencies"
    labels: ["dependencies"]
  - title: "Documentation"
    labels: ["documentation"]

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"

version-resolver:
  major:
    labels: ["major", "breaking"]
  minor:
    labels: ["feature", "enhancement"]
  patch:
    labels: ["bug", "fix", "dependencies", "ci", "documentation"]
  default: patch

exclude-labels:
  - "skip-changelog"

autolabeler:
  - label: "go"
    files: ["*.go", "go.mod", "go.sum", "provisioner/**/*.go"]
  - label: "swift"
    files: ["ConfigUI/**/*.swift"]
  - label: "provisioning"
    files: ["provisioner/**"]
  - label: "ci"
    files: [".github/**"]
  - label: "documentation"
    files: ["*.md", "docs/**"]
